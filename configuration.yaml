# This is the home assistant configuration file. See the docs at https://www.home-assistant.io/docs/configuration/ for details.
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml



#ffmpeg enabled here for dahua camera integration streaming
ffmpeg:
#enable log files for dahua camera integration: 
logger:
  default: info
  logs:
    custom_components.dahua: debug

climate:
    # Thermostat 1
  - platform: infinitude
    host: 192.168.1.105
    port: 3000
    zone_names: # If your thermostat's zoning is enabled, recommend setting the zone names on the thermostat and leaving the zone entries blank (total zones must still match hyphens)
      - 1st Floor
    # Thermostat 2
  - platform: infinitude
    host: 192.168.1.107
    port: 3000
    zone_names:
      - 2nd Floor # Change to your preference

# enable https secure connections
http:
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.1.170          # ← your NixOS server IP
    
# ────────────────────────────────────────────────
# Modern template entities (migrate old sensor style here)
template:
  - sensor:
      - name: "Formatted Date"
        icon: "mdi:calendar"
        state: "{{ as_timestamp(strptime(states('sensor.date'), '%Y-%m-%d')) | timestamp_custom('%a, %b %d') }}"

